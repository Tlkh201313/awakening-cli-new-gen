cmd = "./awakened"
args = ["acp"]

[agent_servers.awakened.targets.linux-x86_64]
archive = "https://github.com/anomalyco/awakened/releases/download/v1.0.0/awakened-linux-x64.tar.gz"
cmd = "./awakened"
args = ["acp"]

[agent_servers.awakened.targets.windows-x86_64]
