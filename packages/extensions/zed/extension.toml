id = "awakened"
name = "Awakened"
description = "The open source coding agent."
version = "1.0.0"
schema_version = 1
authors = ["Anomaly"]
repository = "https://github.com/Tlkh201313/awakening-cli-new-gen"

[agent_servers.awakened]
